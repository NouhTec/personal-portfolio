<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد نوح المغربي | مهندس ميكاترونكس</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        // إعدادات Tailwind لتخصيص الألوان والثيم الغامق
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6', // أزرق فاتح للحركات والأزرار
                        darkBg: '#111827', // لون الخلفية الغامقة الأساسية
                        darkCard: '#1f2937', // لون بطاقات المهارات والمشاريع
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        /* تحسين شكل شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
    </style>
</head>
<body class="bg-darkBg text-gray-200 antialiased overflow-x-hidden">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-darkBg/80 backdrop-blur-sm border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" class="text-2xl font-800 text-white tracking-tight">محمد <span class="text-primary">المغربي</span></a>
            <div class="hidden md:flex items-center space-x-2 space-x-reverse text-sm">
                <a href="#about" class="px-4 py-2 rounded-full hover:bg-gray-800 hover:text-white transition">عنّي</a>
                <a href="#skills" class="px-4 py-2 rounded-full hover:bg-gray-800 hover:text-white transition">المهارات</a>
                <a href="#projects" class="px-4 py-2 rounded-full hover:bg-gray-800 hover:text-white transition">المشاريع</a>
                <a href="#contact" class="bg-primary text-darkBg px-5 py-2 rounded-full font-bold hover:bg-blue-400 transition ml-4">تواصل معي</a>
            </div>
        </div>
    </nav>

    <header id="hero" class="min-h-screen flex items-center justify-center relative pt-20">
        <div class="absolute inset-0 opacity-10">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1" fill="#fff"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#dotPattern)"/>
            </svg>
        </div>
        
        <div class="max-w-4xl mx-auto px-6 text-center z-10" data-aos="zoom-in" data-aos-duration="1000">
            <span class="inline-block bg-gray-800 text-primary px-4 py-1 rounded-full text-xs font-semibold mb-4 border border-gray-700">مرحباً بك في عالمي الهندسي</span>
            <h1 class="text-5xl md:text-7xl font-800 text-white mb-6 leading-tight tracking-tighter">محمد نوح المغربي</h1>
            <p class="text-2xl md:text-3xl text-gray-400 mb-10 font-light">مهندس <span class="text-white font-semibold">ميكاترونكس</span> & أخصائي أتمتة بيانات</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="#projects" class="bg-white text-darkBg px-8 py-3 rounded-full font-bold text-lg hover:bg-gray-200 transition duration-300">عرض المشاريع</a>
                <a href="#contact" class="bg-gray-800 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-gray-700 transition duration-300 border border-gray-600">مناقشة فرصة عمل</a>
            </div>
        </div>
    </header>

    <section id="about" class="py-24 bg-darkCard/50">
        <div class="max-w-5xl mx-auto px-6">
            <div class="grid md:grid-cols-3 gap-12 items-center">
                <div class="md:col-span-2" data-aos="fade-left">
                    <h2 class="text-4xl font-800 text-white mb-6 tracking-tight">من أنا؟</h2>
                    <p class="text-lg text-gray-400 leading-relaxed mb-6">
                        خريج جامعة كارابوك بشهادة البكالوريوس في هندسة الميكاترون
